name: CP Test (NPU)

on:
  pull_request:
    branches:
      - testcases
    paths:
      - ".github/workflows/cp-test.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to test. If not provided, uses the default branch.'
        required: false
        type: string
        default: ''
      job_filter:
        description: 'Select which job to run (leave empty or "all" to run all jobs)'
        required: false
        type: string
        default: 'all'
      image_a3:
        description: 'The a3 running docker image of the test task.'
        required: false
        type: string
        default: ''
      skip_install_flag:
        description: 'Indicates whether to skip the installation of sglang, defaulting to false.'
        required: false
        type: string
        default: ''
      test_scope:
        description: 'Test scope: all / single / multi'
        required: true
        type: choice
        options:
          - all
          - single
          - multi
        default: 'single'

concurrency:
  group: single-test-npu-${{ inputs.ref || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  set-image-config:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.set-vars.outputs.ref }}
      job_filter: ${{ steps.set-vars.outputs.job_filter }}
      image_a3: ${{ steps.set-vars.outputs.image_a3 }}
      skip_install_flag: ${{ steps.set-vars.outputs.skip_install_flag }}
      test_scope: ${{ steps.set-vars.outputs.test_scope }}
    steps:
      - name: Set image config
        id: set-vars
        run: |
          if [ -z "${{ inputs.ref }}" ]; then
            echo "ref=" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ inputs.ref }}" >> $GITHUB_OUTPUT
          fi

          if [ -z "${{ inputs.job_filter }}" ]; then
            echo "job_filter=all" >> $GITHUB_OUTPUT
          else
            echo "job_filter=${{ inputs.job_filter }}" >> $GITHUB_OUTPUT
          fi

          if [ -z "${{ inputs.image_a3 }}" ]; then
            echo "image_a3=swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.0-a3-ubuntu22.04-py3.11" >> $GITHUB_OUTPUT
          else
            echo "image_a3=${{ inputs.image_a3 }}" >> $GITHUB_OUTPUT
          fi

          if [ -z "${{ inputs.skip_install_flag }}" ]; then
            echo "skip_install_flag=false" >> $GITHUB_OUTPUT
          else
            echo "skip_install_flag=${{ inputs.skip_install_flag }}" >> $GITHUB_OUTPUT
          fi

          if [ -z "${{ inputs.test_scope }}" ]; then
            echo "test_scope=all" >> $GITHUB_OUTPUT
          else
            echo "test_scope=${{ inputs.test_scope }}" >> $GITHUB_OUTPUT
          fi

  multi-node-tests:
    name: multi-node-poc
    needs: [ set-image-config ]
    if: ${{ !cancelled() && (needs.set-image-config.outputs.test_scope == 'all' || needs.set-image-config.outputs.test_scope == 'poc') }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        test_config:
          - name: test_npu_mimo_v2_separation_accept_rate
            test_case: test/registered/ascend/basic_function/parameter/test_npu_mimo_v2_separation_accept_rate.py
            test_type: 'perf'
            prefill_decode_deployment: 'separation'
            prefill_size: 1
            decode_size: 1
            router_size: 1
#          - name: test_npu_mimo_v2_flash_1p1d_16p_in16k_out1_ttft_5s
#            test_case: test/registered/ascend/performance/mimo_v2_flash/test_npu_mimo_v2_flash_1p1d_16p_in16k_out1_ttft_5s.py
#            test_type: 'perf'
#            prefill_decode_deployment: 'separation'
#            prefill_size: 1
#            decode_size: 1
#            router_size: 1
#          - name: test_npu_mimo_v2_flash_1p1d_16p_in16k_out1k_tpot_20ms
#            test_case: test/registered/ascend/performance/mimo_v2_flash/test_npu_mimo_v2_flash_1p1d_16p_in16k_out1k_tpot_20ms.py
#            test_type: 'perf'
#            prefill_decode_deployment: 'separation'
#            prefill_size: 1
#            decode_size: 1
#            router_size: 1
#          - name: test_npu_mimo_v2_flash_1p1d_16p_in32k_out1_ttft_5s
#            test_case: test/registered/ascend/performance/mimo_v2_flash/test_npu_mimo_v2_flash_1p1d_16p_in32k_out1_ttft_5s.py
#            test_type: 'perf'
#            prefill_decode_deployment: 'separation'
#            prefill_size: 1
#            decode_size: 1
#            router_size: 1
#          - name: test_npu_mimo_v2_flash_1p1d_16p_in32k_out1k_tpot_20ms
#            test_case: test/registered/ascend/performance/mimo_v2_flash/test_npu_mimo_v2_flash_1p1d_16p_in32k_out1k_tpot_20ms.py
#            test_type: 'perf'
#            prefill_decode_deployment: 'separation'
#            prefill_size: 1
#            decode_size: 1
#            router_size: 1
    uses: ./.github/workflows/nightly-test-npu-e2e-multi-node.yml
    with:
      runner: linux-amd64-cpu-8
      test_type: ${{ matrix.test_config.test_type }}
      test_config_name: ${{ matrix.test_config.name }}
      test_case: ${{ matrix.test_config.test_case }}
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/dockerhub/lmsysorg/sglang:cann9.0.0-a3-20260622
      install_sglang_from_source: false
      prefill_decode_deployment: ${{ matrix.test_config.prefill_decode_deployment }}
      node_size: ${{ matrix.test_config.node_size || 1 }}
      prefill_size: ${{ matrix.test_config.prefill_size }}
      decode_size: ${{ matrix.test_config.decode_size }}
      router_size: ${{ matrix.test_config.router_size }}
      transformers_version: ''

  single-node-tests:
    name: single-node-poc
    needs: [ set-image-config, multi-node-tests ]
    if: ${{ !cancelled() && (needs.set-image-config.outputs.test_scope == 'all' || needs.set-image-config.outputs.test_scope == 'poc') }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        test_config:
          - name: test_npu_mimo_v2_accept_rate
            runner: linux-aarch64-a3-16
            test_case: test/registered/ascend/basic_function/parameter/test_npu_mimo_v2_accept_rate.py
            test_type: 'function'
#          - name: test_npu_llava_onevision_qwen2_7b_ov
#            runner: linux-aarch64-a3-2
#            test_case: test/registered/ascend/vlm_models/test_npu_llava_onevision_qwen2_7b_ov.py
#            test_type: 'function'
#          - name: test_npu_constrained_json_whitespace_pattern
#            runner: linux-aarch64-a3-2
#            test_case: test/registered/ascend/basic_function/runtime_options/test_npu_constrained_json_whitespace_pattern.py
#            test_type: 'function'
#          - name: test_npu_pd_disaggregation_ha_mixed_worker_failover
#            runner: linux-aarch64-a3-16
#            test_case: test/registered/ascend/temp/test_npu_pd_disaggregation_ha_mixed_worker_failover.py
#            test_type: 'function'
    uses: ./.github/workflows/nightly-test-npu-e2e-single-node.yml
    with:
      runner: ${{ matrix.test_config.runner }}
      test_type: ${{ matrix.test_config.test_type }}
      test_config_name: ${{ matrix.test_config.name }}
      test_case: ${{ matrix.test_config.test_case }}
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/dockerhub/lmsysorg/sglang:cann9.0.0-a3-20260622
      install_sglang_from_source: false
      transformers_version: ''

  check-all-jobs:
    needs:
      - set-image-config
      - multi-node-tests
      - single-node-tests
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check job status
        run: |
          FAILED=0
          echo "=== Check non-skipped jobs ==="
          ${{ contains(needs.*.result, 'failure') }} && FAILED=1
          ${{ contains(needs.*.result, 'cancelled') }} && FAILED=1
          if [ $FAILED -eq 1 ]; then
            echo "❌ Some jobs failed or cancelled"
            exit 1
          fi
          echo "✅ All selected scope jobs passed"
