name: Single Test (NPU)

on:
  pull_request:
    branches:
      - testcases
    paths:
      - ".github/workflows/single-test-npu.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to test. If not provided, uses the default branch.'
        required: false
        type: string
        default: ''
      job_filter:
        description: 'Select which job to run (leave empty or "all" to run all jobs)'
        required: false
        type: string
        default: 'all'
      image_a3:
        description: 'The a3 running docker image of the test task.'
        required: false
        type: string
        default: ''
      skip_install_flag:
        description: 'Indicates whether to skip the installation of sglang, defaulting to false.'
        required: false
        type: string
        default: ''
      test_scope:
        description: 'Test scope: all / single / multi'
        required: true
        type: choice
        options:
          - all
          - single
          - multi
        default: 'single'

concurrency:
  group: single-test-npu-${{ inputs.ref || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  set-image-config:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.set-vars.outputs.ref }}
      job_filter: ${{ steps.set-vars.outputs.job_filter }}
      image_a3: ${{ steps.set-vars.outputs.image_a3 }}
      skip_install_flag: ${{ steps.set-vars.outputs.skip_install_flag }}
      test_scope: ${{ steps.set-vars.outputs.test_scope }}
    steps:
      - name: Set image config
        id: set-vars
        run: |
          if [ -z "${{ inputs.ref }}" ]; then
            echo "ref=" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ inputs.ref }}" >> $GITHUB_OUTPUT
          fi

          if [ -z "${{ inputs.job_filter }}" ]; then
            echo "job_filter=all" >> $GITHUB_OUTPUT
          else
            echo "job_filter=${{ inputs.job_filter }}" >> $GITHUB_OUTPUT
          fi

          if [ -z "${{ inputs.image_a3 }}" ]; then
            echo "image_a3=swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.0-a3-ubuntu22.04-py3.11" >> $GITHUB_OUTPUT
          else
            echo "image_a3=${{ inputs.image_a3 }}" >> $GITHUB_OUTPUT
          fi

          if [ -z "${{ inputs.skip_install_flag }}" ]; then
            echo "skip_install_flag=false" >> $GITHUB_OUTPUT
          else
            echo "skip_install_flag=${{ inputs.skip_install_flag }}" >> $GITHUB_OUTPUT
          fi

          if [ -z "${{ inputs.test_scope }}" ]; then
            echo "test_scope=all" >> $GITHUB_OUTPUT
          else
            echo "test_scope=${{ inputs.test_scope }}" >> $GITHUB_OUTPUT
          fi

  run-single-test:
    needs: set-image-config
    runs-on: linux-aarch64-a3-2
    container:
      image: ${{ needs.set-image-config.outputs.image_a3 }}
      options: --privileged --network host --shm-size=1g --pid=host
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.set-image-config.outputs.ref || github.sha }}
          fetch-depth: 0

      - name: Set up environment
        run: |
          source /usr/local/Ascend/ascend-toolkit/set_env.sh
          source /usr/local/Ascend/nnal/atb/set_env.sh
          echo "ASCEND_TOOLKIT_HOME=/usr/local/Ascend/ascend-toolkit" >> $GITHUB_ENV
          echo "ASCEND_NNAL_HOME=/usr/local/Ascend/nnal/atb" >> $GITHUB_ENV

      - name: Install sglang
        if: needs.set-image-config.outputs.skip_install_flag != 'true'
        run: |
          pip install -e python/

      - name: Run single test for performance tuning
        run: |
          echo "========================================="
          echo "Performance Tuning Test"
          echo "========================================="
          echo "Test case: test_npu_qwen3_6_27b_w8a8_1p_in3k5_out1k5_50ms.py"
          echo "Purpose: Tune num_prompts, max_concurrency, request_rate for optimal throughput"
          echo "Constraint: TPOT <= 50ms"
          echo "========================================="
          
          python -m pytest \
            test/registered/ascend/performance/test_npu_qwen3_6_27b_w8a8_1p_in3k5_out1k5_50ms.py \
            -v \
            --tb=short \
            --log-cli-level=INFO \
            2>&1 | tee test_results.log

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_results.log
          retention-days: 30

      - name: Extract and report metrics
        run: |
          echo "========================================="
          echo "Performance Metrics Summary"
          echo "========================================="
          
          if [ -f test_results.log ]; then
            echo "Mean TTFT:"
            grep "Mean TTFT" test_results.log || echo "N/A"
            
            echo "Mean TPOT:"
            grep "Mean TPOT" test_results.log || echo "N/A"
            
            echo "Output token throughput:"
            grep "Output token throughput" test_results.log || echo "N/A"
            
            echo "Mean E2E Latency:"
            grep "Mean E2E Latency" test_results.log || echo "N/A"
          fi
          
          echo "========================================="
          echo "Tuning Parameters:"
          echo "- num_prompts: 216"
          echo "- max_concurrency: 54"
          echo "- request_rate: N/A (using batch mode)"
          echo "- TPOT constraint: <= 50ms"
          echo "========================================="
