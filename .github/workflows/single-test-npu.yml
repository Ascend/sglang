          #   test_type: 'perf'
          # - name: test_npu_qwen3_6_27b_w8a8_2p_in64k_out1k_prefix90_50ms
          #   runner: linux-aarch64-a3-4
          #   test_case: test/registered/ascend/performance/test_npu_qwen3_6_27b_w8a8_2p_in64k_out1k_prefix90_50ms.py
          #   test_type: 'perf'
          # - name: test_npu_qwen3_6_27b_w8a8_2p_in128k_out1k_50ms
          #   runner: linux-aarch64-a3-4
